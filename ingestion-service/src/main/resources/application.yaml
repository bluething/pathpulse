spring:
  application:
    name: ingestion-service

  # Virtual Threads - Java 25 / Spring Boot 4 feature
  threads:
    virtual:
      enabled: true

# Server configuration
server:
  port: 8081

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized